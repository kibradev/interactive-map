<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Interactive GTA Map</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.3/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.3/dist/leaflet.js"></script>
<style>
    #map { width: 100%; height: 100vh; background: #0fa8d2; }
    body { overflow: hidden; margin: 0; }
    .ios-user-marker-wrap {
        background: transparent !important;
        border: none !important;
    }
    .ios-user-marker-wrap .leaflet-div-icon {
        border: none !important;
        background: transparent !important;
    }

    .leaflet-popup.ios-map-popup {
        margin-bottom: 10px;
    }
    .leaflet-popup.ios-map-popup .leaflet-popup-content-wrapper {
        background: rgba(255, 255, 255, 0.94);
        backdrop-filter: blur(24px) saturate(180%);
        -webkit-backdrop-filter: blur(24px) saturate(180%);
        border-radius: 14px;
        box-shadow:
            0 8px 28px rgba(0, 0, 0, 0.14),
            0 2px 8px rgba(0, 0, 0, 0.06),
            inset 0 0.5px 0 rgba(255, 255, 255, 0.85);
        border: 0.5px solid rgba(0, 0, 0, 0.08);
        padding: 0;
    }
    .leaflet-popup.ios-map-popup .leaflet-popup-content {
        margin: 0;
        padding: 0;
        line-height: 1.2;
        min-width: 0;
    }
    .leaflet-popup.ios-map-popup .leaflet-popup-tip-container {
        width: 22px;
        height: 12px;
        margin-top: -1px;
    }
    .leaflet-popup.ios-map-popup .leaflet-popup-tip {
        width: 14px;
        height: 14px;
        margin: -7px auto 0;
        padding: 0;
        background: rgba(255, 255, 255, 0.94);
        border: 0.5px solid rgba(0, 0, 0, 0.08);
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.08);
        transform: rotate(45deg);
    }
    .leaflet-popup.ios-map-popup .leaflet-popup-close-button {
        display: none;
    }

    .ios-popup-inner {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 9px 12px;
        font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', system-ui, sans-serif;
    }
    .ios-popup-icon {
        flex-shrink: 0;
        width: 22px;
        height: 22px;
        border-radius: 6px;
        overflow: hidden;
        display: flex;
        align-items: center;
        justify-content: center;
        background: rgba(0, 0, 0, 0.04);
    }
    .ios-popup-icon img {
        width: 18px;
        height: 18px;
        object-fit: contain;
        display: block;
    }
    .ios-popup-icon-player {
        background: rgba(12, 121, 254, 0.12);
        position: relative;
    }
    .ios-popup-icon-player::after {
        content: '';
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #0C79FE;
        box-shadow: 0 0 0 2px #fff;
    }
    .ios-popup-label {
        font-size: 13px;
        font-weight: 600;
        letter-spacing: -0.2px;
        color: #1c1c1e;
        word-break: break-word;
    }

    @keyframes iosMapPopupIn {
        from {
            opacity: 0;
            transform: translateY(8px) scale(0.9);
        }
        to {
            opacity: 1;
            transform: translateY(0) scale(1);
        }
    }
    .leaflet-popup.ios-map-popup.ios-popup-enter .leaflet-popup-content-wrapper {
        animation: iosMapPopupIn 0.32s cubic-bezier(0.32, 0.72, 0, 1) both;
        transform-origin: center bottom;
    }
    .leaflet-popup.ios-map-popup.ios-popup-enter .leaflet-popup-tip-container {
        animation: iosMapPopupIn 0.32s cubic-bezier(0.32, 0.72, 0, 1) both;
        transform-origin: center top;
    }

    .ios-route-halo {
        filter: drop-shadow(0 1px 2px rgba(0, 0, 0, 0.18));
    }
</style>
</head>
<body>
<div id="map"></div>
<script>
var center_x = 117.3;
var center_y = 172.8;
var scale_x = 0.02072;
var scale_y = 0.0205;

var CUSTOM_CRS = L.extend({}, L.CRS.Simple, {
    projection: L.Projection.LonLat,
    scale: function(zoom) { return Math.pow(2, zoom); },
    zoom: function(sc) { return Math.log(sc) / 0.6931471805599453; },
    distance: function(pos1, pos2) {
        var x_difference = pos2.lng - pos1.lng;
        var y_difference = pos2.lat - pos1.lat;
        return Math.sqrt(x_difference * x_difference + y_difference * y_difference);
    },
    transformation: new L.Transformation(scale_x, center_x, -scale_y, center_y),
    infinite: true
});

var AtlasStyle = L.tileLayer('mapStyles/styleAtlas/{z}/{x}/{y}.jpg', {
    minZoom: 0, maxZoom: 5, noWrap: true, continuousWorld: false,
    attribution: 'Online map GTA V', id: 'styleAtlas map'
});

var mymap = L.map('map', {
    crs: CUSTOM_CRS,
    minZoom: 1,
    maxZoom: 5,
    maxNativeZoom: 5,
    preferCanvas: false,
    layers: [AtlasStyle],
    center: [0, 0],
    zoom: 3,
    zoomControl: false,
    attributionControl: false
});

var params = new URLSearchParams(window.location.search);
var rawBase = params.get('blipIconBase');
var blipIconBase = null;
if (rawBase) {
    try { rawBase = decodeURIComponent(rawBase); } catch (e0) {}
    rawBase = (rawBase || '').trim();
    if (rawBase.indexOf('https://') === 0 || rawBase.indexOf('http://127.0.0.1') === 0 || rawBase.indexOf('http://localhost') === 0) {
        blipIconBase = rawBase.replace(/\/?$/, '/');
    }
}

var playerMarkerIndex = parseInt(params.get('playerMarkerIndex'), 10);
if (!Number.isFinite(playerMarkerIndex)) playerMarkerIndex = -1;

var playerHeadingParam = parseFloat(params.get('playerHeading'));
if (!Number.isFinite(playerHeadingParam)) playerHeadingParam = null;

function blipIconUrl(spriteId) {
    var sid = parseInt(spriteId, 10);
    if (!Number.isFinite(sid) || sid < 0) sid = 1;
    if (blipIconBase) return blipIconBase + sid + '.png';
    return 'blips/' + sid + '.png';
}

function iosUserLocationSvg(headingDeg) {
    var h = Number(headingDeg);
    if (!Number.isFinite(h)) h = 0;
    h = ((h % 360) + 360) % 360;
    var blue = '#0C79FE';
    return (
        '<svg xmlns="http://www.w3.org/2000/svg" width="88" height="88" viewBox="0 0 88 88" aria-hidden="true">' +
        '<defs>' +
        '<radialGradient id="iosBeam" cx="50%" cy="100%" r="75%">' +
        '<stop offset="0%" stop-color="' + blue + '" stop-opacity="0.42"/>' +
        '<stop offset="55%" stop-color="' + blue + '" stop-opacity="0.12"/>' +
        '<stop offset="100%" stop-color="' + blue + '" stop-opacity="0"/>' +
        '</radialGradient>' +
        '<filter id="iosDotShadow" x="-50%" y="-50%" width="200%" height="200%">' +
        '<feDropShadow dx="0" dy="1" stdDeviation="1.2" flood-color="#000" flood-opacity="0.22"/>' +
        '</filter>' +
        '</defs>' +
        '<g transform="translate(44 44) rotate(' + h + ')">' +
        '<path d="M 0 2 L 26 -42 A 46 46 0 0 0 -26 -42 Z" fill="url(#iosBeam)"/>' +
        '</g>' +
        '<circle cx="44" cy="44" r="8.5" fill="' + blue + '" stroke="#fff" stroke-width="3" filter="url(#iosDotShadow)"/>' +
        '</svg>'
    );
}

function iconPlayerIos(headingDeg) {
    return L.divIcon({
        className: 'ios-user-marker-wrap',
        html: iosUserLocationSvg(headingDeg),
        iconSize: [88, 88],
        iconAnchor: [44, 44],
        popupAnchor: [0, -12]
    });
}

function iconForSprite(spriteId, isPlayer, headingDeg) {
    if (isPlayer) {
        var hd = playerHeadingParam;
        if (hd === null && headingDeg !== undefined && headingDeg !== null) {
            hd = Number(headingDeg);
        }
        return iconPlayerIos(hd !== null && hd !== undefined ? hd : 0);
    }
    var sid = parseInt(spriteId, 10);
    if (!Number.isFinite(sid) || sid < 0) sid = 1;
    return L.icon({
        iconUrl: blipIconUrl(sid),
        iconSize: [22, 22],
        iconAnchor: [11, 11],
        popupAnchor: [0, -12],
        crossOrigin: true
    });
}

var playerLayer = L.featureGroup().addTo(mymap);
var blipsLayer = L.featureGroup().addTo(mymap);
mymap.createPane('routePane');
mymap.getPane('routePane').style.zIndex = 410;
var routeLayer = L.featureGroup().addTo(mymap);
var focusLayer = L.featureGroup().addTo(mymap);

window.__phonePlayer = null;
window.__phoneRouteLines = [];
window.__phonePreviewActive = false;
window.__phonePlayerMarker = null;

function setPhonePlayer(x, y, heading) {
    if (!Number.isFinite(Number(x)) || !Number.isFinite(Number(y))) return;
    window.__phonePlayer = { x: Number(x), y: Number(y), heading: heading };
}

function clearBlipPreview() {
    routeLayer.clearLayers();
    window.__phoneRouteLines = [];
    window.__phonePreviewActive = false;
}

function iosRouteLatLngs(fromY, fromX, toY, toX) {
    var dx = toX - fromX;
    var dy = toY - fromY;
    var dist = Math.hypot(dx, dy);
    if (!Number.isFinite(dist) || dist < 2) {
        return [[fromY, fromX], [toY, toX]];
    }
    var midY = (fromY + toY) / 2;
    var midX = (fromX + toX) / 2;
    var bulge = Math.min(dist * 0.14, 90);
    var nx = -dy / dist;
    var ny = dx / dist;
    var ctrlY = midY + ny * bulge;
    var ctrlX = midX + nx * bulge;
    var pts = [];
    var steps = 28;
    for (var i = 0; i <= steps; i++) {
        var t = i / steps;
        var u = 1 - t;
        pts.push([
            u * u * fromY + 2 * u * t * ctrlY + t * t * toY,
            u * u * fromX + 2 * u * t * ctrlX + t * t * toX
        ]);
    }
    return pts;
}

function drawIosRoute(fromX, fromY, toX, toY, mode) {
    clearBlipPreview();
    var fromLat = fromY;
    var fromLng = fromX;
    var toLat = toY;
    var toLng = toX;
    var pts = iosRouteLatLngs(fromLat, fromLng, toLat, toLng);
    var isWalk = mode === 'walk';
    var halo = L.polyline(pts, {
        pane: 'routePane',
        color: '#ffffff',
        weight: isWalk ? 7 : 9,
        opacity: 0.95,
        lineCap: 'round',
        lineJoin: 'round',
        className: 'ios-route-halo',
        interactive: false
    }).addTo(routeLayer);
    var line = L.polyline(pts, {
        pane: 'routePane',
        color: isWalk ? '#34C759' : '#0A84FF',
        weight: isWalk ? 4 : 5,
        opacity: 1,
        lineCap: 'round',
        lineJoin: 'round',
        dashArray: isWalk ? '10, 12' : null,
        interactive: false
    }).addTo(routeLayer);
    window.__phoneRouteLines = [halo, line];
}

function fitBlipPreview(fromX, fromY, toX, toY) {
    var dist = Math.hypot(toX - fromX, toY - fromY);
    if (!Number.isFinite(dist) || dist < 150) {
        var z = dist < 40 ? 5 : 4;
        if (typeof mymap.flyTo === 'function') {
            mymap.flyTo([toY, toX], z, { animate: true, duration: 0.5 });
        } else {
            mymap.setView([toY, toX], z);
        }
        return;
    }
    var bounds = L.latLngBounds([[fromY, fromX], [toY, toX]]);
    var opts = { padding: [72, 72], maxZoom: 5, animate: true, duration: 0.55 };
    if (typeof mymap.flyToBounds === 'function') {
        mymap.flyToBounds(bounds, opts);
    } else {
        mymap.fitBounds(bounds, opts);
    }
}

function showBlipPreview(fromX, fromY, toX, toY, opts) {
    opts = opts || {};
    setPhonePlayer(fromX, fromY, null);
    window.__phonePreviewActive = true;
    var mode = opts.mode === 'walk' ? 'walk' : 'drive';
    if (Number.isFinite(fromX) && Number.isFinite(fromY)) {
        drawIosRoute(fromX, fromY, toX, toY, mode);
        fitBlipPreview(fromX, fromY, toX, toY);
    } else {
        clearBlipPreview();
        if (typeof mymap.flyTo === 'function') {
            mymap.flyTo([toY, toX], 5, { animate: true, duration: 0.5 });
        } else {
            mymap.setView([toY, toX], 5);
        }
    }
}

function updatePlayerMarker(x, y, label, heading) {
    setPhonePlayer(x, y, heading);
    if (window.__phonePlayerMarker) {
        playerLayer.removeLayer(window.__phonePlayerMarker);
        window.__phonePlayerMarker = null;
    }
    var hd = Number(heading);
    if (!Number.isFinite(hd)) hd = playerHeadingParam;
    var mk = L.marker([y, x], { icon: iconForSprite(null, true, hd) });
    bindIosPopup(mk, label || 'You', null, true);
    window.__phonePlayerMarker = mk.addTo(playerLayer);
}

function centerOnPlayerIfIdle() {
    if (window.__phonePreviewActive) return;
    var p = window.__phonePlayer;
    if (!p || !Number.isFinite(p.x) || !Number.isFinite(p.y)) return;
    if (typeof mymap.flyTo === 'function') {
        mymap.flyTo([p.y, p.x], 4, { animate: true, duration: 0.45 });
    } else {
        mymap.setView([p.y, p.x], 4);
    }
}

function focusBlipOnMap(x, y, label, sprite) {
    var p = window.__phonePlayer;
    if (p && Number.isFinite(p.x) && Number.isFinite(p.y)) {
        showBlipPreview(p.x, p.y, x, y, { label: label, sprite: sprite, mode: 'drive' });
    } else if (typeof mymap.flyTo === 'function') {
        mymap.flyTo([y, x], 5, { animate: true, duration: 0.5 });
    } else {
        mymap.setView([y, x], 5);
    }
}

function popupFromPart(p) {
    if (!p) return '';
    try { return decodeURIComponent(p); } catch (e1) { return p; }
}

function escapePopupHtml(text) {
    return String(text || 'Location')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
}

var IOS_POPUP_OPTS = {
    className: 'ios-map-popup',
    closeButton: false,
    autoPan: true,
    maxWidth: 260,
    minWidth: 72,
    offset: [0, -6]
};

function iosPopupHtml(label, spriteId, isPlayer) {
    var safe = escapePopupHtml(label);
    var iconHtml = '';
    if (isPlayer) {
        iconHtml = '<span class="ios-popup-icon ios-popup-icon-player" aria-hidden="true"></span>';
    } else if (spriteId !== null && spriteId !== undefined && Number.isFinite(Number(spriteId))) {
        iconHtml = '<span class="ios-popup-icon"><img src="' + blipIconUrl(spriteId) + '" alt="" draggable="false" /></span>';
    }
    return '<div class="ios-popup-inner">' + iconHtml + '<span class="ios-popup-label">' + safe + '</span></div>';
}

function bindIosPopup(marker, label, spriteId, isPlayer) {
    marker.bindPopup(iosPopupHtml(label, spriteId, isPlayer), IOS_POPUP_OPTS);
    return marker;
}

function postToPhone(payload) {
    try { window.parent.postMessage(payload, '*'); } catch (e0) {}
    try { if (window.top && window.top !== window) window.top.postMessage(payload, '*'); } catch (e1) {}
}

function postBlipSelect(x, y, label, sprite) {
    postToPhone({
        source: '0r-phone-map',
        type: 'blipSelect',
        x: x,
        y: y,
        label: label,
        sprite: sprite
    });
}

function postBlipClear() {
    postToPhone({ source: '0r-phone-map', type: 'blipClear' });
}

var suppressBlipMapClear = false;

function tagBlipMarker(marker, x, y, label, sprite) {
    marker.options.phoneBlipData = { x: x, y: y, label: label, sprite: sprite };
}

function attachBlipSelect(marker, x, y, label, sprite) {
    tagBlipMarker(marker, x, y, label, sprite);
    marker.on('click', function(ev) {
        L.DomEvent.stopPropagation(ev);
        if (ev.originalEvent) {
            L.DomEvent.stopPropagation(ev.originalEvent);
        }
        suppressBlipMapClear = true;
        focusBlipOnMap(x, y, label, sprite);
        postBlipSelect(x, y, label, sprite);
        window.setTimeout(function() {
            suppressBlipMapClear = false;
        }, 200);
    });
}

function findNearestBlipAt(latlng, maxDist) {
    var best = null;
    var bestD = maxDist;
    blipsLayer.eachLayer(function(layer) {
        var data = layer.options && layer.options.phoneBlipData;
        if (!data) return;
        var ll = layer.getLatLng();
        if (!ll) return;
        var d = Math.hypot(ll.lng - latlng.lng, ll.lat - latlng.lat);
        if (d < bestD) {
            bestD = d;
            best = data;
        }
    });
    return best;
}

mymap.on('click', function(ev) {
    if (suppressBlipMapClear) return;
    var hit = findNearestBlipAt(ev.latlng, 140);
    if (hit) {
        focusBlipOnMap(hit.x, hit.y, hit.label, hit.sprite);
        postBlipSelect(hit.x, hit.y, hit.label, hit.sprite);
        return;
    }
    postBlipClear();
    clearBlipPreview();
});

mymap.on('popupopen', function(ev) {
    var el = ev.popup && ev.popup.getElement ? ev.popup.getElement() : null;
    if (!el || !el.classList.contains('ios-map-popup')) return;
    el.classList.remove('ios-popup-enter');
    void el.offsetWidth;
    el.classList.add('ios-popup-enter');
    el.addEventListener('animationend', function() {
        el.classList.remove('ios-popup-enter');
    }, { once: true });
});

function fitAllMarkers() {
    var merged = L.featureGroup([playerLayer, blipsLayer, focusLayer]);
    if (merged.getLayers().length > 0) {
        mymap.fitBounds(merged.getBounds(), { padding: [50, 50] });
    }
}

function addBlipMarkers(list) {
    blipsLayer.clearLayers();
    if (!Array.isArray(list)) return;
    list.forEach(function(m) {
        if (!m || !Number.isFinite(Number(m.x)) || !Number.isFinite(Number(m.y))) return;
        var px = Number(m.x);
        var py = Number(m.y);
        if (Math.abs(px) <= 1 && Math.abs(py) <= 1) return;
        var lab = String(m.label || '').trim() || 'Marker';
        var sp = m.sprite;
        if (typeof sp !== 'number' || !Number.isFinite(sp)) {
            sp = parseInt(sp, 10);
        }
        if (!Number.isFinite(sp) || sp < 0) sp = 0;
        sp = Math.floor(sp);
        var mk = L.marker([py, px], { icon: iconForSprite(sp, false, null) });
        attachBlipSelect(mk, px, py, lab, sp);
        mk.addTo(blipsLayer);
    });
}

var coordsList = params.get('coords');

if (coordsList) {
    var points = coordsList.split(';');
    points.forEach(function(point, idx) {
        var parts = point.split(',');
        if (parts.length >= 2) {
            var px = parseFloat(parts[0]);
            var py = parseFloat(parts[1]);
            if (!Number.isFinite(px) || !Number.isFinite(py)) return;
            if (Math.abs(px) <= 1 && Math.abs(py) <= 1) return;
            var popupText = parts.length >= 3 ? popupFromPart(parts[2]) : ('' + px + ', ' + py);
            var sp = parts.length >= 4 ? parts[3] : null;
            var isPlayer = idx === playerMarkerIndex;
            var layer = isPlayer ? playerLayer : blipsLayer;
            var spNum = sp !== null ? parseInt(sp, 10) : null;
            var mk = L.marker([py, px], { icon: iconForSprite(sp, isPlayer, null) });
            if (isPlayer) {
                setPhonePlayer(px, py, playerHeadingParam);
                bindIosPopup(mk, popupText, null, true);
            } else if (spNum !== null && Number.isFinite(spNum)) {
                attachBlipSelect(mk, px, py, popupText, spNum);
            }
            mk.addTo(layer);
        }
    });
    fitAllMarkers();
} else {
    var x = parseFloat(params.get('x'));
    var y = parseFloat(params.get('y'));
    var hasExplicitPoint = Number.isFinite(x) && Number.isFinite(y) && (Math.abs(x) > 1 || Math.abs(y) > 1);
    if (hasExplicitPoint) {
        var textParam = params.get('text');
        var popupText = textParam ? popupFromPart(textParam) : ('' + x + ', ' + y);
        bindIosPopup(L.marker([y, x], { icon: iconForSprite(null, true, playerHeadingParam) }), popupText, null, true).addTo(playerLayer);
        mymap.setView([y, x], 4);
    }
}

function isAllowedMapParent(origin) {
    if (origin == null || typeof origin !== 'string') return false;
    if (origin.indexOf('https://cfx-nui-') === 0) return true;
    if (origin.indexOf('nui://') === 0) return true;
    if (origin.indexOf('http://localhost') === 0) return true;
    if (origin.indexOf('http://127.0.0.1') === 0) return true;
    if (origin === 'null') return true;
    if (origin.indexOf('https://') === 0) return true;
    return false;
}

window.addEventListener('message', function(ev) {
    if (!isAllowedMapParent(ev.origin)) return;
    var d = ev.data;
    if (!d || d.source !== '0r-phone-map') return;
    if (d.type === 'playerUpdate') {
        var ux = Number(d.x);
        var uy = Number(d.y);
        if (!Number.isFinite(ux) || !Number.isFinite(uy)) return;
        var ulab = typeof d.label === 'string' ? d.label : 'You';
        var uhd = Number(d.heading);
        updatePlayerMarker(ux, uy, ulab, Number.isFinite(uhd) ? uhd : null);
        if (!window.__phonePreviewActive) {
            centerOnPlayerIfIdle();
        }
        return;
    }
    if (d.type === 'blips') {
        addBlipMarkers(Array.isArray(d.markers) ? d.markers : []);
        return;
    }
    if (d.type === 'blipPreview') {
        if (d.clear) {
            clearBlipPreview();
            return;
        }
        var pfx = Number(d.fromX);
        var pfy = Number(d.fromY);
        var ptx = Number(d.toX);
        var pty = Number(d.toY);
        if (!Number.isFinite(ptx) || !Number.isFinite(pty)) return;
        var previewMode = d.mode === 'walk' ? 'walk' : 'drive';
        if (Number.isFinite(pfx) && Number.isFinite(pfy)) {
            showBlipPreview(pfx, pfy, ptx, pty, {
                label: typeof d.label === 'string' ? d.label : '',
                sprite: d.sprite,
                mode: previewMode
            });
        } else {
            clearBlipPreview();
            if (typeof mymap.flyTo === 'function') {
                mymap.flyTo([pty, ptx], 5, { animate: true, duration: 0.5 });
            } else {
                mymap.setView([pty, ptx], 5);
            }
        }
        return;
    }
    if (d.type === 'focusPoint') {
        if (d.clear) {
            if (window.__phoneFocusMarker) {
                focusLayer.removeLayer(window.__phoneFocusMarker);
                window.__phoneFocusMarker = null;
            }
            clearBlipPreview();
            return;
        }
        var fx = Number(d.x);
        var fy = Number(d.y);
        if (!Number.isFinite(fx) || !Number.isFinite(fy)) return;
        if (d.panOnly) {
